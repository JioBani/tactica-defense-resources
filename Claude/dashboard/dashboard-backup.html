<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatica Defence — 작업 대시보드</title>
    <style>
        @font-face {
            font-family: '365오후2시';
            src: url('../365오후2시.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FFF7CD;
            --surface: #FFFDF2;
            --surface-hover: #FFEFB8;
            --border: #FDC3A1;
            --text: #5C3322;
            --text-dim: #A07858;
            --accent: #F57799;
            --success: #FB9B8F;
            --warning: #FDC3A1;
            --danger: #E05570;
            --in-progress: #F57799;
            --pending: #FFE4CC;
            --pixel-shadow: #E8AD8A;
        }

        body {
            font-family: '365오후2시', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            image-rendering: pixelated;
        }

        .pixel-box {
            border: 3px solid var(--border);
            box-shadow:
                3px 3px 0 var(--pixel-shadow),
                inset 1px 1px 0 rgba(255,255,255,0.5);
        }

        .petals-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }
        .petal {
            position: absolute;
            top: -20px;
            width: 8px;
            height: 8px;
            background: #FB9B8F;
            opacity: 0.6;
            animation: fall linear infinite;
        }
        .petal:nth-child(odd) {
            width: 6px; height: 6px;
            background: #FDC3A1;
            opacity: 0.5;
        }
        .petal:nth-child(3n) {
            width: 4px; height: 4px;
            background: #F57799;
            opacity: 0.35;
        }
        @keyframes fall {
            0%   { transform: translateY(0) translateX(0); }
            25%  { transform: translateY(25vh) translateX(15px); }
            50%  { transform: translateY(50vh) translateX(-10px); }
            75%  { transform: translateY(75vh) translateX(20px); }
            100% { transform: translateY(105vh) translateX(5px); }
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 3px solid var(--border);
            background: var(--surface);
            box-shadow: 0 3px 0 var(--pixel-shadow);
        }
        .topbar h1 {
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .topbar h1 span { color: var(--accent); }
        .topbar h1::before { content: ">> "; color: var(--border); }
        .topbar .updated {
            font-size: 13px;
            color: var(--text-dim);
        }

        .layout {
            display: flex;
            height: calc(100vh - 57px);
            position: relative;
        }

        .sidebar {
            width: 280px;
            min-width: 280px;
            border-right: 3px solid var(--border);
            background: var(--surface);
            overflow-y: auto;
            padding: 12px 0;
        }
        .sidebar-title {
            font-size: 12px;
            font-weight: 400;
            text-transform: uppercase;
            color: var(--accent);
            padding: 8px 16px 6px;
            letter-spacing: 2px;
        }
        .sidebar-title::before { content: "[ "; }
        .sidebar-title::after { content: " ]"; }
        .sidebar {
            transition: width 0.25s ease, min-width 0.25s ease;
        }
        .sidebar.drawer-closed {
            width: 0;
            min-width: 0;
            padding: 0;
            overflow: hidden;
            border-right: none;
        }
        .drawer-handle {
            position: absolute;
            left: 280px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 48px;
            background: var(--surface);
            border: 3px solid var(--border);
            border-left: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--accent);
            z-index: 10;
            box-shadow: 3px 3px 0 var(--pixel-shadow);
            transition: left 0.25s ease;
        }
        .drawer-handle:hover { background: var(--surface-hover); }
        .sidebar.drawer-closed ~ .drawer-handle {
            left: 0;
            border-left: 3px solid var(--border);
        }
        .ticket-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: none;
            color: var(--text);
            font-family: '365오후2시', monospace;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: background 0.1s;
        }
        .ticket-btn:hover { background: var(--surface-hover); }
        .ticket-btn.active {
            background: rgba(245,119,153,0.12);
            border-left: 4px solid var(--accent);
        }
        .ticket-btn .badge {
            font-size: 12px;
            font-weight: 400;
            padding: 2px 6px;
            border-radius: 0;
            border: 2px solid;
            white-space: nowrap;
            font-family: '365오후2시', monospace;
        }
        .badge-active {
            background: rgba(245,119,153,0.15);
            color: var(--accent);
            border-color: var(--accent);
        }
        .badge-done {
            background: rgba(251,155,143,0.15);
            color: var(--success);
            border-color: var(--success);
        }
        .ticket-btn .ticket-id {
            font-weight: 400;
            color: var(--text-dim);
            font-size: 13px;
            min-width: 72px;
        }
        .ticket-btn .ticket-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .ticket-btn .mini-progress {
            width: 40px;
            height: 6px;
            background: var(--pending);
            border-radius: 0;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .ticket-btn .mini-progress-fill {
            height: 100%;
            border-radius: 0;
            transition: width 0.3s;
        }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
            background:
                radial-gradient(circle at 90% 10%, rgba(245,119,153,0.06) 0%, transparent 40%),
                radial-gradient(circle at 10% 80%, rgba(253,195,161,0.08) 0%, transparent 40%),
                var(--bg);
        }
        .main-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            font-size: 15px;
        }

        .ticket-header {
            margin-bottom: 28px;
        }
        .ticket-header h2 {
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .ticket-header h2 .tid { color: var(--accent); }
        .ticket-header .subtitle {
            font-size: 14px;
            color: var(--text-dim);
        }
        .ticket-header .subtitle::before { content: "~ "; color: var(--border); }

        .workflow {
            background: var(--surface);
            border: 3px solid var(--border);
            border-radius: 0;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: 4px 4px 0 var(--pixel-shadow);
        }
        .workflow .section-title {
            font-size: 13px;
            font-weight: 400;
            color: var(--accent);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .steps {
            display: flex;
            align-items: center;
            gap: 0;
            position: relative;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }
        .step-circle {
            width: 32px;
            height: 32px;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 400;
            border: 3px solid var(--border);
            background: var(--bg);
            color: var(--text-dim);
            margin-bottom: 8px;
            transition: all 0.2s;
            box-shadow: 2px 2px 0 var(--pixel-shadow);
        }
        .step.completed .step-circle {
            background: var(--success);
            border-color: #E88878;
            color: #fff;
        }
        .step.current .step-circle {
            background: var(--in-progress);
            border-color: #D85A78;
            color: #fff;
            box-shadow: 2px 2px 0 var(--pixel-shadow), 0 0 12px rgba(245,119,153,0.3);
        }
        .step-label {
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
            white-space: nowrap;
        }
        .step.completed .step-label,
        .step.current .step-label { color: var(--text); }

        .step-connector {
            position: absolute;
            top: 16px;
            left: calc(50% + 20px);
            right: calc(-50% + 20px);
            height: 3px;
            background: var(--border);
            z-index: 0;
        }
        .step:last-child .step-connector { display: none; }
        .step.completed .step-connector { background: var(--success); }

        .definition {
            background: var(--surface);
            border: 3px solid var(--border);
            border-radius: 0;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: 4px 4px 0 var(--pixel-shadow);
        }
        .definition .section-title {
            font-size: 13px;
            font-weight: 400;
            color: var(--accent);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .definition p {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text);
        }
        .definition .completion-criteria {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 2px dashed var(--border);
        }
        .definition .completion-criteria li {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-dim);
            margin-left: 16px;
            margin-bottom: 4px;
        }
        .definition .completion-criteria li::marker { content: "> "; color: var(--accent); }

        .checklist {
            background: var(--surface);
            border: 3px solid var(--border);
            border-radius: 0;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: 4px 4px 0 var(--pixel-shadow);
        }
        .checklist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .checklist-header .section-title {
            font-size: 13px;
            font-weight: 400;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .checklist-header .progress-info {
            font-size: 14px;
            color: var(--text-dim);
        }
        .checklist-header .progress-info strong {
            color: var(--accent);
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--pending);
            border-radius: 0;
            border: 2px solid var(--border);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 0;
            background: repeating-linear-gradient(
                90deg,
                var(--success) 0px,
                var(--success) 8px,
                var(--in-progress) 8px,
                var(--in-progress) 10px
            );
            transition: width 0.4s ease;
        }

        .checklist-section {
            margin-bottom: 16px;
        }
        .checklist-section:last-child { margin-bottom: 0; }
        .checklist-section-title {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-dim);
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 2px dashed var(--border);
        }
        .checklist-section-title::before { content: "-- "; color: var(--border); }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 6px 4px;
            border-radius: 0;
            font-size: 14px;
            line-height: 1.5;
        }
        .check-item:hover { background: var(--surface-hover); }
        .check-icon {
            width: 18px;
            height: 18px;
            min-width: 18px;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            margin-top: 1px;
            border: 2px solid var(--border);
        }
        .check-icon.completed {
            background: var(--success);
            border-color: #E88878;
            color: #fff;
        }
        .check-icon.in-progress {
            background: var(--in-progress);
            border-color: #D85A78;
            color: #fff;
        }
        .check-icon.pending {
            border: 2px solid var(--pending);
            background: none;
        }
        .check-item.completed .check-text { color: var(--text-dim); }
        .check-item.in-progress .check-text { color: var(--accent); }

        /* ── Collapsible Sections ── */
        .section-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .section-toggle:hover { opacity: 0.8; }
        .section-toggle .toggle-arrow {
            display: inline-block;
            transition: transform 0.2s;
            font-size: 12px;
            color: var(--accent);
        }
        .section-toggle .toggle-arrow::after { content: "▼"; }
        .collapsed .section-toggle .toggle-arrow::after { content: "▶"; }
        .section-body {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.2s ease;
            max-height: 2000px;
            opacity: 1;
        }
        .collapsed .section-body {
            max-height: 0;
            opacity: 0;
        }
        .collapsed .progress-bar { display: none; }
        .collapsed .checklist-header { margin-bottom: 0; }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 14px;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 0;
            border: 2px solid var(--bg);
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>
    <div class="petals-container" id="petals"></div>
    <div class="topbar">
        <h1><span>Tatica Defence</span> &mdash; 작업 대시보드</h1>
        <div class="updated" id="updatedAt"></div>
    </div>
    <div class="layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-title">Tickets</div>
            <div id="ticketList"></div>
        </nav>
        <div class="drawer-handle" id="drawerHandle" onclick="toggleDrawer()">◀</div>
        <main class="main" id="mainContent">
            <div class="main-empty">좌측에서 티켓을 선택하세요</div>
        </main>
    </div>

    <script>

        "유닛 테스트 통과"

      "checklist": [

        {"text": "Unity 컴파일 확인 (refresh_unity + read_console)", "status": "completed", "section": "검증 항목"},

    },
    {
      "id": "TACD-200",
      "title": "[전장 - 소환수] 배치/이동/스왑",
      "stage": 6,
      "summary": "소환수(Defender)의 배치/이동/스왑 시스템을 구현한다. 대기석과 전장 간 드래그&드롭 기반의 배치 조작을 완성하고, 배치 제한 규칙을 적용한다.",
      "completionCriteria": [

    let selectedId = DATA.activeTicket || (DATA.tickets.length > 0 ? DATA.tickets[0].id : null);

    function render() {
        document.getElementById('updatedAt').textContent = '최종 갱신: ' + DATA.updatedAt;
        renderSidebar();
        if (selectedId) renderMain(selectedId);
    }

    function renderSidebar() {
        const container = document.getElementById('ticketList');
        container.innerHTML = DATA.tickets.map(t => {
            const pct = t.checklist.length > 0
                ? Math.round(t.checklist.filter(c => c.status === 'completed').length / t.checklist.length * 100)
                : 0;
            const progressColor = pct === 100 ? 'var(--success)' : 'var(--in-progress)';
            const isActive = t.id === selectedId;
            const isBranch = t.id === DATA.activeTicket;
            return `
                <button class="ticket-btn ${isActive ? 'active' : ''}" onclick="selectTicket('${t.id}')">
                    <span class="ticket-id">${t.id}</span>
                    <span class="ticket-title">${t.title || '제목 없음'}</span>
                    ${isBranch ? '<span class="badge badge-active">branch</span>' : ''}
                    ${pct === 100 ? '<span class="badge badge-done">done</span>' : `
                    <div class="mini-progress">
                        <div class="mini-progress-fill" style="width:${pct}%;background:${progressColor}"></div>
                    </div>`}
                </button>`;
        }).join('');
    }

    function renderMain(ticketId) {
        selectedId = ticketId;
        renderSidebar();
        const t = DATA.tickets.find(x => x.id === ticketId);
        if (!t) {
            document.getElementById('mainContent').innerHTML = '<div class="main-empty">티켓을 찾을 수 없습니다</div>';
            return;
        }

        const stageLabels = ['확인', '작업정의', '구현계획', '현황판', '구현', '완료'];
        const stepsHtml = stageLabels.map((label, i) => {
            const num = i + 1;
            let cls = '';
            if (num < t.stage) cls = 'completed';
            else if (num === t.stage) cls = 'current';
            return `
                <div class="step ${cls}">
                    <div class="step-circle">${num < t.stage ? '&#10003;' : num}</div>
                    <div class="step-label">${label}</div>
                    <div class="step-connector"></div>
                </div>`;
        }).join('');

        const total = t.checklist.length;
        const done = t.checklist.filter(c => c.status === 'completed').length;
        const pct = total > 0 ? Math.round(done / total * 100) : 0;

        // Group checklist by section
        const sections = {};
        t.checklist.forEach(item => {
            const sec = item.section || '항목';
            if (!sections[sec]) sections[sec] = [];
            sections[sec].push(item);
        });

        let checklistHtml = '';
        if (total > 0) {
            let sectionsHtml = Object.entries(sections).map(([name, items]) => `
                <div class="checklist-section">
                    <div class="checklist-section-title">${name}</div>
                    ${items.map(item => `
                        <div class="check-item ${item.status}">
                            <div class="check-icon ${item.status}">
                                ${item.status === 'completed' ? '&#10003;' : item.status === 'in-progress' ? '&#9654;' : ''}
                            </div>
                            <span class="check-text">${item.text}</span>
                        </div>`).join('')}
                </div>`).join('');

            checklistHtml = `
                <div class="checklist" id="sec-checklist">
                    <div class="checklist-header section-toggle" onclick="toggleSection('sec-checklist')">
                        <div class="section-title">작업현황판</div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div class="progress-info"><strong>${done}</strong> / ${total} (${pct}%)</div>
                            <span class="toggle-arrow"></span>
                        </div>
                    </div>
                    <div class="section-body">
                        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                        ${sectionsHtml}
                    </div>
                </div>`;
        } else {
            checklistHtml = `
                <div class="checklist" id="sec-checklist">
                    <div class="checklist-header section-toggle" onclick="toggleSection('sec-checklist')">
                        <div class="section-title">작업현황판</div>
                        <span class="toggle-arrow"></span>
                    </div>
                    <div class="section-body">
                        <div class="no-data">작업현황판이 아직 작성되지 않았습니다</div>
                    </div>
                </div>`;
        }

        let definitionHtml = '';
        if (t.summary || (t.completionCriteria && t.completionCriteria.length > 0)) {
            definitionHtml = `
                <div class="definition" id="sec-definition">
                    <div class="section-toggle section-title" onclick="toggleSection('sec-definition')">
                        <span>작업정의</span>
                        <span class="toggle-arrow"></span>
                    </div>
                    <div class="section-body">
                        ${t.summary ? `<p>${t.summary}</p>` : ''}
                        ${t.completionCriteria && t.completionCriteria.length > 0 ? `
                        <div class="completion-criteria">
                            <ul>${t.completionCriteria.map(c => `<li>${c}</li>`).join('')}</ul>
                        </div>` : ''}
                    </div>
                </div>`;
        }

        document.getElementById('mainContent').innerHTML = `
            <div class="ticket-header">
                <h2><span class="tid">${t.id}</span> ${t.title || ''}</h2>
                <div class="subtitle">Stage ${t.stage}/6 &middot; ${stageLabels[t.stage - 1] || ''}</div>
            </div>
            <div class="workflow" id="sec-workflow">
                <div class="section-toggle section-title" onclick="toggleSection('sec-workflow')">
                    <span>작업지시서 진행 상태</span>
                    <span class="toggle-arrow"></span>
                </div>
                <div class="section-body">
                    <div class="steps">${stepsHtml}</div>
                </div>
            </div>
            ${definitionHtml}
            ${checklistHtml}
        `;
    }

    function toggleDrawer() {
        const sidebar = document.getElementById('sidebar');
        const handle = document.getElementById('drawerHandle');
        sidebar.classList.toggle('drawer-closed');
        handle.textContent = sidebar.classList.contains('drawer-closed') ? '▶' : '◀';
    }

    function toggleSection(id) {
        document.getElementById(id).classList.toggle('collapsed');
    }

    function selectTicket(id) {
        selectedId = id;
        renderMain(id);
    }

    render();

    // Falling sakura petals
    (function() {
        const container = document.getElementById('petals');
        for (let i = 0; i < 15; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + '%';
            petal.style.animationDuration = (6 + Math.random() * 8) + 's';
            petal.style.animationDelay = Math.random() * 10 + 's';
            container.appendChild(petal);
        }
    })();
    </script>
