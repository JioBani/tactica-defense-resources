<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>택티카 디펜스 - 전장 모바일 UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans KR', Arial, sans-serif;
            overflow: hidden;
            width: 360px;
            height: 800px;
            margin: 0 auto;
            position: relative;
            background: #000;
        }

        /* ==================== SCENE 영역 ==================== */
        #game-scene {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: linear-gradient(180deg,
                #2a4a3a 0%,
                #3a3a2a 40%,
                #4a2a2a 100%
            );
            overflow: hidden;
        }

        /* 전장 배경 */
        .battlefield-bg {
            width: 100%;
            height: 60%;
            position: absolute;
            top: 10%;
            left: 0;
            background:
                linear-gradient(90deg,
                    rgba(100, 150, 255, 0.1) 0% 30%,
                    rgba(255, 255, 255, 0.05) 30% 70%,
                    rgba(255, 100, 100, 0.1) 70% 100%
                );
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 전투 그리드 가이드 (시각적 참고용) */
        .battle-grid {
            width: 90%;
            height: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2px;
            opacity: 0.3;
        }

        .grid-guide {
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        /* Scene 내 유닛들 (3D 오브젝트처럼 배치) */
        .unit-scene {
            position: absolute;
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #4a90e2, #2c5aa0);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
        }

        .enemy-scene {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #e74c3c, #a02c2c);
            border-radius: 50%;
            border: 2px solid rgba(255, 100, 100, 0.7);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        /* 예시 유닛 배치 */
        .unit-1 { top: 25%; left: 15%; }
        .unit-2 { top: 35%; left: 25%; }
        .unit-3 { top: 45%; left: 20%; }
        .unit-4 { top: 55%; left: 10%; }
        .unit-5 { top: 30%; left: 8%; }

        .enemy-1 { top: 28%; right: 15%; }
        .enemy-2 { top: 40%; right: 20%; }
        .enemy-3 { top: 52%; right: 12%; }

        /* 대기 소환수 (Scene 하단, 벤치 영역) */
        .bench-scene {
            position: absolute;
            bottom: 120px;
            left: 0;
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 10px;
            background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.3));
        }

        .bench-unit-scene {
            width: 50px;
            height: 60px;
            background: rgba(40, 40, 40, 0.8);
            border: 2px solid rgba(100, 100, 100, 0.6);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
        }

        .bench-unit-scene.has-unit {
            background: rgba(60, 60, 60, 0.9);
            border-color: rgba(74, 144, 226, 0.8);
        }

        .bench-unit-avatar {
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #4a90e2, #2c5aa0);
            border-radius: 50%;
            margin-bottom: 3px;
        }

        .bench-unit-star {
            font-size: 8px;
            color: #ffd700;
        }

        /* ==================== UI CANVAS 영역 ==================== */
        #ui-canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 100;
        }

        #ui-canvas * {
            pointer-events: auto;
        }

        /* 상단 HUD */
        .top-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.4));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            z-index: 101;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .hud-icon {
            width: 18px;
            height: 18px;
            background: #ffd700;
            border-radius: 50%;
        }

        .hud-value {
            color: white;
            font-weight: bold;
        }

        /* 웨이브 정보 (상단 중앙) */
        .wave-indicator {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid #e74c3c;
            font-size: 14px;
            color: white;
            font-weight: bold;
            z-index: 102;
        }

        /* 코어 HP (좌측 상단, 작게) */
        .core-hp-indicator {
            position: absolute;
            top: 55px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #4a90e2;
            z-index: 102;
        }

        .core-hp-label {
            font-size: 9px;
            color: #aaa;
        }

        .core-hp-value {
            font-size: 14px;
            color: #4a90e2;
            font-weight: bold;
        }

        /* 시너지 버튼 (좌측 중간) */
        .synergy-btn {
            position: absolute;
            top: 120px;
            left: 8px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #4a90e2;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
            z-index: 103;
        }

        .synergy-btn:active {
            background: rgba(74, 144, 226, 0.5);
        }

        /* 전술 지원 버튼 (좌측 하단) */
        .support-btn {
            position: absolute;
            top: 170px;
            left: 8px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #27ae60;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
            z-index: 103;
        }

        .support-btn:active {
            background: rgba(39, 174, 96, 0.5);
        }

        /* 시너지 패널 (토글) */
        .synergy-panel {
            position: absolute;
            top: 120px;
            left: -250px;
            width: 240px;
            max-height: 350px;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #4a90e2;
            border-radius: 12px;
            padding: 15px;
            transition: left 0.3s ease;
            z-index: 104;
            overflow-y: auto;
        }

        .synergy-panel.active {
            left: 55px;
        }

        .panel-title {
            font-size: 14px;
            color: #4a90e2;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .synergy-item {
            background: rgba(50, 50, 50, 0.8);
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 6px;
            border-left: 3px solid #4a90e2;
        }

        .synergy-name {
            font-size: 12px;
            color: white;
            font-weight: bold;
        }

        .synergy-progress {
            font-size: 10px;
            color: #aaa;
            margin-top: 2px;
        }

        /* 하단 소환 터미널 (슬라이드 업) */
        .shop-panel {
            position: absolute;
            bottom: -300px;
            left: 0;
            width: 100%;
            height: 300px;
            background: rgba(20, 20, 20, 0.98);
            border-top: 3px solid #4a90e2;
            border-radius: 20px 20px 0 0;
            transition: bottom 0.3s ease;
            z-index: 105;
            display: flex;
            flex-direction: column;
        }

        .shop-panel.active {
            bottom: 0;
        }

        /* 상점 헤더 */
        .shop-header {
            height: 50px;
            background: rgba(40, 40, 40, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shop-handle {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 30px;
            background: rgba(20, 20, 20, 0.98);
            border: 2px solid #4a90e2;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
        }

        .shop-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-small.secondary {
            background: #666;
        }

        .btn-small:active {
            opacity: 0.7;
        }

        /* 상점 슬롯 */
        .shop-slots {
            height: 130px;
            display: flex;
            gap: 8px;
            padding: 15px 12px;
            overflow-x: auto;
        }

        .shop-slot {
            min-width: 75px;
            height: 100px;
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid #666;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            cursor: pointer;
        }

        .shop-slot:active {
            background: rgba(74, 144, 226, 0.3);
        }

        .shop-unit-avatar {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #4a90e2, #2c5aa0);
            border-radius: 50%;
            margin-bottom: 6px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .shop-unit-name {
            font-size: 10px;
            color: white;
            text-align: center;
        }

        .shop-unit-cost {
            font-size: 9px;
            color: #ffd700;
            margin-top: 3px;
        }

        /* 상점 하단 버튼 */
        .shop-footer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 15px;
            background: rgba(30, 30, 30, 0.9);
        }

        .btn-large {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .btn-large:active {
            transform: scale(0.95);
        }

        .btn-expand {
            background: #e67e22;
        }

        /* 우측 빠른 버튼들 */
        .quick-actions {
            position: absolute;
            bottom: 200px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 106;
        }

        .quick-btn {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #4a90e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
        }

        .quick-btn:active {
            background: rgba(74, 144, 226, 0.5);
        }

        .quick-btn.start {
            background: rgba(39, 174, 96, 0.9);
            border-color: #27ae60;
            width: 60px;
            height: 60px;
            font-size: 24px;
        }

        /* 배치 정보 (우측 상단) */
        .deploy-info {
            position: absolute;
            top: 55px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #e67e22;
            font-size: 11px;
            color: white;
            z-index: 102;
        }

        .deploy-count {
            font-size: 16px;
            font-weight: bold;
            color: #e67e22;
        }
    </style>
</head>
<body>
    <!-- ==================== GAME SCENE ==================== -->
    <div id="game-scene">
        <!-- 전장 배경 -->
        <div class="battlefield-bg">
            <div class="battle-grid">
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>

                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>

                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>

                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
                <div class="grid-guide"></div>
            </div>
        </div>

        <!-- 아군 유닛들 (Scene 오브젝트) -->
        <div class="unit-scene unit-1">⚔️</div>
        <div class="unit-scene unit-2">🛡️</div>
        <div class="unit-scene unit-3">🏹</div>
        <div class="unit-scene unit-4">⚔️</div>
        <div class="unit-scene unit-5">🔮</div>

        <!-- 적 유닛들 (Scene 오브젝트) -->
        <div class="enemy-scene enemy-1"></div>
        <div class="enemy-scene enemy-2"></div>
        <div class="enemy-scene enemy-3"></div>

        <!-- 대기 소환수 벤치 (Scene 하단) -->
        <div class="bench-scene">
            <div class="bench-unit-scene has-unit">
                <div class="bench-unit-avatar"></div>
                <div class="bench-unit-star">★★</div>
            </div>
            <div class="bench-unit-scene has-unit">
                <div class="bench-unit-avatar"></div>
                <div class="bench-unit-star">★</div>
            </div>
            <div class="bench-unit-scene has-unit">
                <div class="bench-unit-avatar"></div>
                <div class="bench-unit-star">★★★</div>
            </div>
            <div class="bench-unit-scene"></div>
            <div class="bench-unit-scene"></div>
            <div class="bench-unit-scene"></div>
        </div>
    </div>

    <!-- ==================== UI CANVAS ==================== -->
    <div id="ui-canvas">
        <!-- 상단 HUD -->
        <div class="top-hud">
            <div class="hud-item">
                <div class="hud-icon" style="background: #ffd700;"></div>
                <div class="hud-value">125</div>
            </div>
            <div class="hud-item">
                <div class="hud-icon" style="background: #4a90e2;"></div>
                <div class="hud-value">50</div>
            </div>
            <div class="hud-item">
                <div class="hud-value">갱신 2G</div>
            </div>
        </div>

        <!-- 웨이브 정보 -->
        <div class="wave-indicator">
            웨이브 5 / 20
        </div>

        <!-- 코어 HP -->
        <div class="core-hp-indicator">
            <div class="core-hp-label">코어</div>
            <div class="core-hp-value">1000</div>
        </div>

        <!-- 배치 정보 -->
        <div class="deploy-info">
            <div style="font-size: 9px; color: #aaa;">배치</div>
            <div class="deploy-count">5/8</div>
        </div>

        <!-- 시너지 버튼 -->
        <button class="synergy-btn" onclick="toggleSynergy()">
            🎯
        </button>

        <!-- 전술 지원 버튼 -->
        <button class="support-btn" onclick="alert('전술 지원 열기')">
            ⚡
        </button>

        <!-- 시너지 패널 (토글) -->
        <div class="synergy-panel" id="synergyPanel">
            <div class="panel-title">활성 시너지</div>

            <div class="synergy-item">
                <div class="synergy-name">⚙️ 기계 계열</div>
                <div class="synergy-progress">3/6 활성</div>
            </div>

            <div class="synergy-item">
                <div class="synergy-name">⚔️ 강습 전술</div>
                <div class="synergy-progress">2/4 활성</div>
            </div>

            <div class="synergy-item" style="opacity: 0.5;">
                <div class="synergy-name">🔮 마법 계열</div>
                <div class="synergy-progress">1/3 미활성</div>
            </div>

            <div class="panel-title" style="margin-top: 15px; color: #27ae60;">전술 지원</div>

            <div class="synergy-item" style="border-left-color: #27ae60;">
                <div class="synergy-name">💎 초기 마나 강화</div>
                <div class="synergy-progress">+20 마나</div>
            </div>
        </div>

        <!-- 우측 빠른 액션 버튼 -->
        <div class="quick-actions">
            <button class="quick-btn start" onclick="toggleShop()">
                🛒
            </button>
            <button class="quick-btn" onclick="alert('설정')">
                ⚙️
            </button>
        </div>

        <!-- 하단 소환 터미널 (슬라이드 업) -->
        <div class="shop-panel" id="shopPanel">
            <!-- 드래그 핸들 -->
            <div class="shop-handle" onclick="toggleShop()">
                ▼
            </div>

            <!-- 상점 헤더 -->
            <div class="shop-header">
                <div class="shop-actions">
                    <button class="btn-small">갱신 2G</button>
                    <button class="btn-small secondary">잠금</button>
                </div>
                <button class="btn-small" style="background: #e67e22;">확장 4G</button>
            </div>

            <!-- 상점 슬롯 -->
            <div class="shop-slots">
                <div class="shop-slot">
                    <div class="shop-unit-avatar"></div>
                    <div class="shop-unit-name">기계병 A</div>
                    <div class="shop-unit-cost">⭐ 1</div>
                </div>
                <div class="shop-slot">
                    <div class="shop-unit-avatar"></div>
                    <div class="shop-unit-name">강습병 B</div>
                    <div class="shop-unit-cost">⭐ 2</div>
                </div>
                <div class="shop-slot">
                    <div class="shop-unit-avatar"></div>
                    <div class="shop-unit-name">방어병 C</div>
                    <div class="shop-unit-cost">⭐ 1</div>
                </div>
                <div class="shop-slot">
                    <div class="shop-unit-avatar"></div>
                    <div class="shop-unit-name">마법사 D</div>
                    <div class="shop-unit-cost">⭐ 3</div>
                </div>
            </div>

            <!-- 상점 하단 버튼 -->
            <div class="shop-footer">
                <button class="btn-large">웨이브 시작</button>
            </div>
        </div>
    </div>

    <script>
        function toggleShop() {
            const panel = document.getElementById('shopPanel');
            panel.classList.toggle('active');

            const handle = document.querySelector('.shop-handle');
            if (panel.classList.contains('active')) {
                handle.innerHTML = '▼';
            } else {
                handle.innerHTML = '▲';
            }
        }

        function toggleSynergy() {
            const panel = document.getElementById('synergyPanel');
            panel.classList.toggle('active');
        }
    </script>
</body>
</html>
