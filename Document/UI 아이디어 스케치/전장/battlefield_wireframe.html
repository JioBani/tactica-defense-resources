<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>택티카 디펜스 - 전장 UI 와이어프레임</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 상단 HUD */
        .top-hud {
            height: 60px;
            background: #2a2a2a;
            border-bottom: 2px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .hud-left, .hud-center, .hud-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .hud-item {
            background: #3a3a3a;
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid #555;
        }

        .label {
            color: #aaa;
            font-size: 12px;
            margin-right: 8px;
        }

        .value {
            color: #fff;
            font-weight: bold;
            font-size: 16px;
        }

        /* 메인 게임 영역 */
        .main-game-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 전장 영역 (중앙) */
        .battlefield-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #252525;
            position: relative;
        }

        .battlefield {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 4px;
            padding: 20px;
            background: linear-gradient(180deg, #1a3a2a 0%, #2a1a1a 100%);
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .grid-cell.player-area {
            background: rgba(100, 150, 255, 0.1);
            border-color: rgba(100, 150, 255, 0.3);
        }

        .grid-cell.enemy-path {
            background: rgba(255, 100, 100, 0.1);
            border-color: rgba(255, 100, 100, 0.3);
        }

        .unit-placeholder {
            width: 80%;
            height: 80%;
            background: #4a90e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .enemy-placeholder {
            width: 70%;
            height: 70%;
            background: #e74c3c;
            border-radius: 50%;
        }

        /* 코어 표시 */
        .core-indicator {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #4a90e2;
        }

        .core-hp {
            font-size: 24px;
            color: #4a90e2;
            font-weight: bold;
        }

        /* 우측 시너지 패널 */
        .synergy-panel {
            width: 250px;
            background: #2a2a2a;
            border-left: 2px solid #444;
            padding: 15px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .synergy-item {
            background: #3a3a3a;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 3px solid #4a90e2;
        }

        .synergy-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .synergy-progress {
            font-size: 12px;
            color: #aaa;
        }

        /* 하단 소환 터미널 & 벤치 영역 */
        .bottom-panel {
            height: 280px;
            background: #2a2a2a;
            border-top: 2px solid #444;
            display: flex;
            flex-direction: column;
        }

        .shop-controls {
            height: 50px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #444;
        }

        .shop-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #4a90e2;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #357abd;
        }

        .btn.secondary {
            background: #666;
        }

        .btn.secondary:hover {
            background: #555;
        }

        .shop-slots {
            height: 120px;
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: #2a2a2a;
            border-bottom: 1px solid #444;
        }

        .shop-slot {
            flex: 1;
            background: #3a3a3a;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shop-slot:hover {
            border-color: #4a90e2;
            background: #404040;
        }

        .shop-unit {
            width: 60px;
            height: 60px;
            background: #4a90e2;
            border-radius: 50%;
            margin-bottom: 8px;
        }

        .shop-unit-name {
            font-size: 12px;
            color: #fff;
        }

        .bench-area {
            flex: 1;
            padding: 10px 20px;
            background: #252525;
        }

        .bench-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .bench-slots {
            display: flex;
            gap: 8px;
        }

        .bench-slot {
            width: 70px;
            height: 70px;
            background: #3a3a3a;
            border: 2px solid #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
        }

        .bench-slot.occupied {
            background: #404040;
            border-color: #4a90e2;
        }

        .bench-unit {
            width: 50px;
            height: 50px;
            background: #4a90e2;
            border-radius: 50%;
        }

        /* 웨이브 정보 오버레이 */
        .wave-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 8px;
            border: 2px solid #e74c3c;
        }

        .wave-number {
            font-size: 28px;
            color: #e74c3c;
            font-weight: bold;
        }

        .wave-timer {
            font-size: 16px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 상단 HUD -->
        <div class="top-hud">
            <div class="hud-left">
                <div class="hud-item">
                    <span class="label">골드</span>
                    <span class="value">125</span>
                </div>
                <div class="hud-item">
                    <span class="label">마나</span>
                    <span class="value">50/100</span>
                </div>
                <div class="hud-item">
                    <span class="label">배치 한계</span>
                    <span class="value">5/8</span>
                </div>
            </div>

            <div class="hud-center">
                <div class="hud-item">
                    <span class="value">웨이브 5 / 20</span>
                </div>
            </div>

            <div class="hud-right">
                <div class="hud-item">
                    <span class="label">소환 터미널 갱신 비용</span>
                    <span class="value">2G</span>
                </div>
            </div>
        </div>

        <!-- 메인 게임 영역 -->
        <div class="main-game-area">
            <!-- 전장 영역 -->
            <div class="battlefield-container">
                <!-- 웨이브 정보 -->
                <div class="wave-info">
                    <div class="wave-number">웨이브 5</div>
                    <div class="wave-timer">준비 시간: 15초</div>
                </div>

                <!-- 코어 상태 -->
                <div class="core-indicator">
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 5px;">코어 HP</div>
                    <div class="core-hp">1000 / 1000</div>
                </div>

                <!-- 전장 그리드 -->
                <div class="battlefield">
                    <!-- 왼쪽 3열: 플레이어 배치 영역 -->
                    <div class="grid-cell player-area">
                        <div class="unit-placeholder">유닛</div>
                    </div>
                    <div class="grid-cell player-area"></div>
                    <div class="grid-cell player-area">
                        <div class="unit-placeholder">유닛</div>
                    </div>

                    <!-- 중간: 전투 영역 -->
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>

                    <!-- 오른쪽: 적 진군 경로 -->
                    <div class="grid-cell enemy-path">
                        <div class="enemy-placeholder"></div>
                    </div>
                    <div class="grid-cell enemy-path"></div>
                    <div class="grid-cell enemy-path">
                        <div class="enemy-placeholder"></div>
                    </div>

                    <!-- 5개 행 반복 (총 40칸) -->
                    <!-- Row 2 -->
                    <div class="grid-cell player-area"></div>
                    <div class="grid-cell player-area">
                        <div class="unit-placeholder">유닛</div>
                    </div>
                    <div class="grid-cell player-area"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell">
                        <div class="enemy-placeholder"></div>
                    </div>
                    <div class="grid-cell enemy-path"></div>
                    <div class="grid-cell enemy-path"></div>
                    <div class="grid-cell enemy-path"></div>

                    <!-- Row 3 -->
                    <div class="grid-cell player-area">
                        <div class="unit-placeholder">유닛</div>
                    </div>
                    <div class="grid-cell player-area"></div>
                    <div class="grid-cell player-area"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell enemy-path"></div>
                    <div class="grid-cell enemy-path">
                        <div class="enemy-placeholder"></div>
                    </div>
                    <div class="grid-cell enemy-path"></div>

                    <!-- Row 4 -->
                    <div class="grid-cell player-area"></div>
                    <div class="grid-cell player-area">
                        <div class="unit-placeholder">유닛</div>
                    </div>
                    <div class="grid-cell player-area"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell enemy-path"></div>
                    <div class="grid-cell enemy-path"></div>
                    <div class="grid-cell enemy-path">
                        <div class="enemy-placeholder"></div>
                    </div>

                    <!-- Row 5 -->
                    <div class="grid-cell player-area"></div>
                    <div class="grid-cell player-area"></div>
                    <div class="grid-cell player-area">
                        <div class="unit-placeholder">유닛</div>
                    </div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell enemy-path"></div>
                    <div class="grid-cell enemy-path"></div>
                    <div class="grid-cell enemy-path"></div>
                </div>
            </div>

            <!-- 우측 시너지 패널 -->
            <div class="synergy-panel">
                <div class="panel-title">활성 시너지</div>

                <div class="synergy-item">
                    <div class="synergy-name">기계 계열</div>
                    <div class="synergy-progress">3/6 활성</div>
                </div>

                <div class="synergy-item">
                    <div class="synergy-name">강습 전술</div>
                    <div class="synergy-progress">2/4 활성</div>
                </div>

                <div class="synergy-item" style="opacity: 0.5;">
                    <div class="synergy-name">마법 계열</div>
                    <div class="synergy-progress">1/3 미활성</div>
                </div>

                <div class="panel-title" style="margin-top: 20px;">전술 지원</div>

                <div class="synergy-item" style="border-left-color: #27ae60;">
                    <div class="synergy-name">초기 마나 강화</div>
                    <div class="synergy-progress">+20 마나</div>
                </div>

                <div class="synergy-item" style="border-left-color: #27ae60;">
                    <div class="synergy-name">추가 배치 슬롯</div>
                    <div class="synergy-progress">+2 슬롯</div>
                </div>
            </div>
        </div>

        <!-- 하단 소환 터미널 & 벤치 -->
        <div class="bottom-panel">
            <!-- 상점 컨트롤 -->
            <div class="shop-controls">
                <div class="shop-actions">
                    <button class="btn">소환 터미널 갱신 (2G)</button>
                    <button class="btn secondary">잠금</button>
                    <button class="btn secondary">배치 한계 확장 (4G)</button>
                </div>
                <div>
                    <button class="btn" style="background: #27ae60;">웨이브 시작</button>
                </div>
            </div>

            <!-- 소환 터미널 슬롯 -->
            <div class="shop-slots">
                <div class="shop-slot">
                    <div class="shop-unit"></div>
                    <div class="shop-unit-name">기계병 A</div>
                </div>
                <div class="shop-slot">
                    <div class="shop-unit"></div>
                    <div class="shop-unit-name">강습병 B</div>
                </div>
                <div class="shop-slot">
                    <div class="shop-unit"></div>
                    <div class="shop-unit-name">방어병 C</div>
                </div>
                <div class="shop-slot">
                    <div class="shop-unit"></div>
                    <div class="shop-unit-name">마법사 D</div>
                </div>
            </div>

            <!-- 벤치 영역 -->
            <div class="bench-area">
                <div class="bench-label">대기 소환수 (벤치)</div>
                <div class="bench-slots">
                    <div class="bench-slot occupied">
                        <div class="bench-unit"></div>
                    </div>
                    <div class="bench-slot occupied">
                        <div class="bench-unit"></div>
                    </div>
                    <div class="bench-slot occupied">
                        <div class="bench-unit"></div>
                    </div>
                    <div class="bench-slot"></div>
                    <div class="bench-slot"></div>
                    <div class="bench-slot"></div>
                    <div class="bench-slot"></div>
                    <div class="bench-slot"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
