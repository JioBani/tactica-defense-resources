<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>택티카 디펜스 — 게임 체계도</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&family=Quicksand:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  /* ───────── Tokens ───────── */
  :root {
    --bg: #fdfaf2;
    --bg-2: #fff8ec;
    --ink: #3a2e2a;
    --ink-soft: #7a6b65;
    --ink-faint: #b5a89f;
    --line: #ead9c4;

    --pink:    #ffe1ec;  --pink-2:    #ffc1d6;  --pink-ink:    #b04465;
    --mint:    #d5f3e2;  --mint-2:    #9fdebb;  --mint-ink:    #3a8a5e;
    --lav:     #ece0ff;  --lav-2:     #c4adff;  --lav-ink:     #6e4dcc;
    --yel:     #fff2bd;  --yel-2:     #ffdf6a;  --yel-ink:     #a07814;
    --sky:     #d9ebff;  --sky-2:     #9ec7f5;  --sky-ink:     #305fa8;
    --peach:   #ffdfc7;  --peach-2:   #ffb38d;  --peach-ink:   #b25b2c;

    --shadow: 0 4px 12px rgba(80, 60, 40, 0.06), 0 1px 2px rgba(80, 60, 40, 0.04);
    --shadow-hover: 0 10px 22px rgba(80, 60, 40, 0.10), 0 2px 4px rgba(80, 60, 40, 0.06);
    --radius: 18px;
    --radius-lg: 24px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Sans KR", "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-width: 1380px;
    font-weight: 400;
    background-image:
      radial-gradient(circle at 14% 6%, rgba(255, 200, 220, 0.25) 0, transparent 38%),
      radial-gradient(circle at 92% 12%, rgba(220, 235, 255, 0.30) 0, transparent 40%),
      radial-gradient(circle at 50% 95%, rgba(255, 240, 190, 0.22) 0, transparent 45%);
  }
  .heading-font { font-family: "Jua", "Noto Sans KR", sans-serif; letter-spacing: -0.01em; }
  .mono { font-family: "JetBrains Mono", "Noto Sans KR", ui-monospace, monospace; }

  /* ───────── Page frame ───────── */
  .page {
    width: min(1640px, 100%);
    min-width: 1380px;
    margin: 0 auto;
    padding: 26px 36px 36px;
  }

  header.top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .brand {
    display: flex; align-items: center; gap: 14px;
  }
  .brand .logo {
    width: 52px; height: 52px; border-radius: 16px;
    background: linear-gradient(135deg, var(--pink) 0%, var(--lav) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: var(--shadow);
  }
  .brand h1 {
    margin: 0;
    font-family: "Jua", "Noto Sans KR", sans-serif;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .brand h1 small {
    display: block;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 12.5px;
    color: var(--ink-soft);
    font-weight: 500;
    margin-top: 3px;
    letter-spacing: 0;
  }
  .top-meta { display: flex; gap: 8px; }
  .top-pill {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: inherit;
    color: var(--ink-soft);
    cursor: pointer;
    font-weight: 500;
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .top-pill:hover { transform: translateY(-1px); box-shadow: var(--shadow); background: var(--bg-2); }
  .top-pill .dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--mint-2); margin-right: 6px; vertical-align: middle;
  }

  /* ───────── Flow grid ───────── */
  .flow {
    display: grid;
    grid-template-columns: 250px 28px 210px 28px 1fr 28px 184px;
    gap: 0;
    align-items: stretch;
  }
  .lane {
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .lane-title {
    font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin: 0 0 10px 4px;
    display: flex; align-items: center; gap: 7px;
  }
  .lane-title .num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--line);
    color: white;
    font-size: 11px; font-weight: 700;
    font-family: "Quicksand", sans-serif;
  }
  .arrow {
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint);
    padding-top: 70px;
  }
  .arrow svg { width: 26px; height: 40px; }

  /* ───────── Card ───────── */
  .card {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 15px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    position: relative;
    box-shadow: var(--shadow);
    text-align: left;
    font-family: inherit;
    color: inherit;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }
  .card:focus-visible { outline: 3px solid var(--lav-2); outline-offset: 2px; }
  .card .head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 5px;
  }
  .card .icon {
    width: 34px; height: 34px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .card .name {
    font-weight: 700;
    font-size: 15.5px;
    letter-spacing: -0.01em;
  }
  .card .sub {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    font-weight: 400;
  }

  /* card tints */
  .tint-lav    { background: linear-gradient(180deg, #faf6ff 0%, #ffffff 80%); border-color: #e0d0ff; }
  .tint-lav    .icon { background: var(--lav); color: var(--lav-ink); }
  .tint-peach  { background: linear-gradient(180deg, #fff5eb 0%, #ffffff 80%); border-color: #ffd0ad; }
  .tint-peach  .icon { background: var(--peach); color: var(--peach-ink); }
  .tint-sky    { background: linear-gradient(180deg, #f3f8ff 0%, #ffffff 80%); border-color: #c9def8; }
  .tint-sky    .icon { background: var(--sky); color: var(--sky-ink); }
  .tint-mint   { background: linear-gradient(180deg, #f1fbf5 0%, #ffffff 80%); border-color: #b9e9cf; }
  .tint-mint   .icon { background: var(--mint); color: var(--mint-ink); }
  .tint-pink   { background: linear-gradient(180deg, #fff4f8 0%, #ffffff 80%); border-color: #ffcfdd; }
  .tint-pink   .icon { background: var(--pink); color: var(--pink-ink); }
  .tint-yel    { background: linear-gradient(180deg, #fffae3 0%, #ffffff 80%); border-color: #ffe48a; }
  .tint-yel    .icon { background: var(--yel); color: var(--yel-ink); }

  .lane.stack { gap: 8px; }

  /* ───────── In-battle inner panel ───────── */
  .battle-panel {
    background: rgba(255, 255, 255, 0.55);
    border: 1.5px dashed #c9def8;
    border-radius: var(--radius-lg);
    padding: 14px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 12px;
    height: 100%;
  }
  .battle-top {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .battle-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .battle-grid .card { padding: 12px 13px; }
  .battle-grid .card .head { margin-bottom: 3px; }
  .battle-grid .card .icon { width: 30px; height: 30px; font-size: 16px; border-radius: 10px; }
  .battle-grid .card .name { font-size: 14.5px; }
  .battle-grid .card .sub { font-size: 12px; line-height: 1.45; }

  /* large/wide cards */
  .card.wide-top .head { margin-bottom: 4px; }

  /* ───────── Bottom strip ───────── */
  .bottom-strip {
    margin-top: 18px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }

  /* ───────── Decorative cat paw ─────────*/
  .paw {
    position: absolute; opacity: 0.10; pointer-events: none;
    font-size: 28px;
  }

  /* ───────── Modal ───────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(60, 40, 30, 0.42);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 30px 20px;
    animation: fadeIn .18s ease;
  }
  .modal-backdrop.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }
  .modal {
    background: var(--bg);
    border-radius: 22px;
    width: min(880px, 100%);
    max-height: 86vh;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(60, 40, 30, 0.30), 0 4px 12px rgba(60, 40, 30, 0.15);
    display: flex; flex-direction: column;
    animation: popIn .22s ease;
    border: 1.5px solid white;
  }
  .modal-head {
    padding: 22px 26px 16px;
    display: flex; align-items: flex-start; gap: 16px;
    border-bottom: 1.5px solid var(--line);
    background: white;
  }
  .modal-head .icon-lg {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .modal-head h2 {
    font-family: "Jua", "Noto Sans KR", sans-serif;
    margin: 0;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .modal-head .tag {
    display: inline-block;
    font-size: 11.5px;
    color: var(--ink-soft);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 10px;
    margin-bottom: 7px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .modal-head .summary {
    font-size: 14px; color: var(--ink-soft);
    margin-top: 5px;
    line-height: 1.55;
  }
  .close-btn {
    margin-left: auto;
    background: var(--bg);
    border: 1.5px solid var(--line);
    width: 34px; height: 34px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: background .15s, color .15s;
    flex-shrink: 0;
  }
  .close-btn:hover { background: var(--pink); color: var(--pink-ink); border-color: var(--pink-2); }

  .modal-body {
    padding: 22px 28px 28px;
    overflow-y: auto;
    background: var(--bg);
    font-size: 14.5px;
    line-height: 1.7;
  }
  .modal-body h3 {
    font-family: "Jua", "Noto Sans KR", sans-serif;
    font-size: 17px;
    margin: 20px 0 9px;
    color: var(--ink);
    font-weight: 400;
    display: flex; align-items: center; gap: 8px;
    letter-spacing: -0.01em;
  }
  .modal-body h3:first-child { margin-top: 0; }
  .modal-body h3::before {
    content: ''; width: 6px; height: 16px; border-radius: 3px;
    background: var(--lav-2);
    display: inline-block;
  }
  .modal-body p { margin: 6px 0; color: var(--ink); }
  .modal-body ul { margin: 6px 0; padding-left: 20px; }
  .modal-body li { margin: 3px 0; }
  .modal-body strong { color: var(--ink); font-weight: 700; }
  .modal-body em { font-style: normal; color: var(--peach-ink); font-weight: 600; background: var(--peach); padding: 1px 6px; border-radius: 4px; }
  .modal-body code { background: white; border: 1px solid var(--line); padding: 1px 6px; border-radius: 4px; font-size: 12px; color: var(--ink); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

  .chip {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
  }
  .chip .chip-h { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 3px; font-weight: 500; }
  .chip .chip-v { font-weight: 700; font-size: 16px; }
  .chip.lav  { background: var(--lav);   border-color: var(--lav-2);   }
  .chip.pink { background: var(--pink);  border-color: var(--pink-2);  }
  .chip.mint { background: var(--mint);  border-color: var(--mint-2);  }
  .chip.yel  { background: var(--yel);   border-color: var(--yel-2);   }
  .chip.sky  { background: var(--sky);   border-color: var(--sky-2);   }
  .chip.peach{ background: var(--peach); border-color: var(--peach-2); }

  table.mini {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0 4px;
    font-size: 13.5px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    border: 1.5px solid var(--line);
  }
  table.mini th, table.mini td {
    padding: 9px 12px;
    text-align: left;
    border-bottom: 1px solid var(--line);
  }
  table.mini th { background: var(--bg-2); font-weight: 700; font-size: 12.5px; color: var(--ink-soft); }
  table.mini tr:last-child td { border-bottom: none; }

  .link-card {
    display: inline-flex; align-items: center; gap: 8px;
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    padding: 6px 13px 6px 6px;
    font-size: 12.5px;
    cursor: pointer;
    margin: 3px 5px 3px 0;
    transition: all .15s;
    color: var(--ink);
    font-family: inherit;
    font-weight: 500;
  }
  .link-card:hover {
    border-color: var(--lav-2);
    background: var(--lav);
    color: var(--lav-ink);
    transform: translateY(-1px);
  }
  .link-card .ic {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: var(--bg);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .link-card .arrow-r { color: var(--ink-faint); font-size: 14px; }

  .links-row { margin: 10px 0 2px; display: flex; flex-wrap: wrap; }
  .related-label {
    font-size: 11.5px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-right: 8px;
    align-self: center;
  }

  .callout {
    background: white;
    border-left: 4px solid var(--mint-2);
    border-radius: 10px;
    padding: 12px 16px;
    margin: 12px 0;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--ink);
  }
  .callout.pink  { border-left-color: var(--pink-2); }
  .callout.yel   { border-left-color: var(--yel-2); }
  .callout.lav   { border-left-color: var(--lav-2); }

  /* phase loop diagram */
  .phase-loop {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: stretch;
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin: 10px 0;
  }
  .phase-block {
    padding: 10px 14px;
    border-radius: 10px;
    text-align: center;
  }
  .phase-block.prep  { background: var(--sky); }
  .phase-block.fight { background: var(--pink); }
  .phase-block .ph-name { font-weight: 700; font-size: 15px; }
  .phase-block .ph-sub  { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; }
  .phase-arrows { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--ink-faint); font-size: 18px; line-height: 1; gap: 4px; }

  /* synergy 2D mini */
  .syn2d {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin: 8px 0;
  }
  .syn-card { border-radius: 12px; padding: 12px 14px; background: white; border: 1.5px solid var(--line); }
  .syn-card .syn-h { font-weight: 700; font-size: 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .syn-card.lav  { background: linear-gradient(180deg, #f5edff 0%, white 100%); border-color: var(--lav-2); }
  .syn-card.mint { background: linear-gradient(180deg, #e9faf0 0%, white 100%); border-color: var(--mint-2); }
  .thresholds { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .th-pill {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    padding: 4px 13px;
    font-family: "Quicksand", "Noto Sans KR", sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* Role icons grid */
  .roles {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    margin: 6px 0;
  }
  .role {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
  }
  .role .r-icon { font-size: 28px; }
  .role .r-name { font-weight: 700; font-size: 13.5px; margin-top: 4px; }
  .role .r-sub  { font-size: 11.5px; color: var(--ink-soft); margin-top: 3px; line-height: 1.4; }

  /* legend */
  .legend {
    margin-top: 16px;
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 11px 18px;
    display: flex; align-items: center; gap: 16px;
    font-size: 12.5px;
    color: var(--ink-soft);
    flex-wrap: wrap;
  }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .legend .sw { width: 14px; height: 14px; border-radius: 5px; border: 1.5px solid var(--line); }

  /* small helper */
  .pulse {
    animation: pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: var(--shadow); }
    50% { box-shadow: 0 0 0 4px rgba(176, 156, 255, 0.18), var(--shadow); }
  }

  .formula {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: "JetBrains Mono", "Noto Sans KR", ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.75;
    margin: 10px 0;
    color: var(--ink);
    white-space: pre-wrap;
  }

  /* ───────── Responsive ───────── */

  /* Tablet / small desktop — stack lanes vertically */
  @media (max-width: 1279px) {
    body { min-width: 0; }
    .page {
      width: 100%;
      min-width: 0;
      padding: 20px 18px 28px;
    }

    .flow {
      grid-template-columns: 1fr;
    }
    .lane { width: 100%; }
    .lane-title { margin-top: 6px; }

    /* Arrows: rotate to point down, full row */
    .arrow {
      padding: 6px 0;
      width: 100%;
      min-height: 36px;
    }
    .arrow svg {
      transform: rotate(90deg);
      width: 22px; height: 32px;
    }

    /* Meta menu: 5 cards into a responsive grid */
    .lane.stack:first-of-type {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .lane.stack:first-of-type .lane-title {
      grid-column: 1 / -1;
    }

    /* Lineup & Reward single-card lanes — don't try to fill */
    .lane.stack:nth-of-type(2) .card,
    .lane.stack:last-of-type .card {
      flex: 0 0 auto !important;
    }

    /* Battle subgrid more compact */
    .battle-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .bottom-strip {
      grid-template-columns: 1fr;
    }

    .legend { font-size: 12px; padding: 10px 14px; }
  }

  /* Phone */
  @media (max-width: 720px) {
    body { font-size: 14px; }
    .page { padding: 14px 12px 22px; }

    /* Header — title shrinks, top-meta wraps */
    header.top {
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .brand .logo { width: 44px; height: 44px; font-size: 22px; }
    .brand h1 { font-size: 20px; }
    .brand h1 small { font-size: 11.5px; }
    .top-meta {
      width: 100%;
      gap: 6px;
      flex-wrap: wrap;
    }
    .top-pill { font-size: 12px; padding: 6px 12px; flex: 1 1 auto; text-align: center; }

    /* Single column for everything */
    .lane.stack:first-of-type {
      grid-template-columns: 1fr;
    }
    .battle-grid {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .battle-top {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .battle-panel { padding: 10px; gap: 10px; }

    .battle-grid .card {
      padding: 10px 11px;
    }
    .battle-grid .card .name { font-size: 13.5px; }
    .battle-grid .card .sub { font-size: 11.5px; }

    .card .name { font-size: 14.5px; }
    .card .sub { font-size: 12px; }

    .legend {
      gap: 8px;
      font-size: 11.5px;
      padding: 10px 12px;
    }

/* ──────────────────────────────────────────────────────────────────
 * Modal control
 * ────────────────────────────────────────────────────────────────── */
const backdrop = document.getElementById('backdrop');
const modal = document.getElementById('modal');
const mIcon = document.getElementById('m-icon');
const mTitle = document.getElementById('modal-title');
const mTag = document.getElementById('m-tag');
const mSummary = document.getElementById('m-summary');
const mBody = document.getElementById('m-body');
let history = [];
let prevFocus = null;

function tintToBg(tint) {
  const map = {
    'tint-lav': 'var(--lav)',
    'tint-pink': 'var(--pink)',
    'tint-mint': 'var(--mint)',
    'tint-yel': 'var(--yel)',
    'tint-sky': 'var(--sky)',
    'tint-peach': 'var(--peach)'
  };
  return map[tint] || 'var(--bg-2)';
}
function tintToInk(tint) {
  const map = {
    'tint-lav': 'var(--lav-ink)',
    'tint-pink': 'var(--pink-ink)',
    'tint-mint': 'var(--mint-ink)',
    'tint-yel': 'var(--yel-ink)',
    'tint-sky': 'var(--sky-ink)',
    'tint-peach': 'var(--peach-ink)'
  };
  return map[tint] || 'var(--ink)';
}

function openModal(key, addToHistory = true) {
  const d = DATA[key];
  if (!d) return;
  if (addToHistory) {
    if (!backdrop.classList.contains('open')) prevFocus = document.activeElement;
    history.push(key);
  }
  mIcon.textContent = d.icon;
  mIcon.style.background = tintToBg(d.tint);
  mIcon.style.color = tintToInk(d.tint);
  mTitle.textContent = d.title;
  mTag.textContent = d.tag;
  mSummary.textContent = d.summary;
  mBody.innerHTML = d.body;
  // re-animate
  modal.style.animation = 'none';
  modal.offsetHeight; /* reflow */
  modal.style.animation = '';
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('m-close').focus(), 30);
}

function closeModal() {
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
  history = [];
  if (prevFocus) prevFocus.focus();
}

document.getElementById('m-close').addEventListener('click', closeModal);
backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal();
});

/* Delegated open click — works on cards and on .link-card inside modal */
document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-open]');
  if (!t) return;
  const key = t.dataset.open;
  if (!DATA[key]) return;
  e.preventDefault();
  openModal(key);
});

/* Make all cards keyboard-activatable */
document.querySelectorAll('.card[data-open], .top-pill[data-open]').forEach(el => {
  if (el.tagName !== 'BUTTON') el.setAttribute('tabindex', '0');
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openModal(el.dataset.open);
    }
  });
});
</script>
